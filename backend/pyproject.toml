[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N"]
ignore = [
    "B008",   # FastAPI Depends() in default args
    "N818",   # exception names without "Error" suffix — historical convention
    "E501",   # line too long — relaxed; covered by line-length=110 already
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:passlib.*",
]
